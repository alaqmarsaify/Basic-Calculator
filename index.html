<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>CALC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }

/* ─── TOKENS — Black 70% · Cyan 30% · Blue 10% ─ */
:root {
  /* Core palette */
  --black:      #000000;
  --black-2:    #050508;
  --black-3:    #080c10;
  --cyan:       #00e5ff;
  --cyan-dim:   rgba(0, 229, 255, 0.45);
  --cyan-faint: rgba(0, 229, 255, 0.12);
  --cyan-glow:  rgba(0, 229, 255, 0.32);
  --blue:       #1a4aff;
  --blue-dim:   rgba(26, 74, 255, 0.35);
  --blue-faint: rgba(26, 74, 255, 0.10);

  /* Surface layers — all near-black */
  --bg:         #000000;                        /* 70 % black */
  --panel:      rgba(4, 6, 12, 0.92);           /* dark panel */
  --btn-num:    rgba(6, 8, 14, 0.95);           /* nearly black num buttons */
  --btn-op:     rgba(0, 229, 255, 0.06);        /* hint of cyan */
  --btn-ac:     rgba(26, 74, 255, 0.08);        /* hint of blue */

  /* Text */
  --text:       rgba(210, 245, 255, 0.90);
  --dim:        rgba(0, 229, 255, 0.42);

  /* Borders */
  --border-c:   rgba(0, 229, 255, 0.18);
  --border-b:   rgba(26, 74, 255, 0.22);

  /* Layout */
  --radius:     clamp(16px, 3vw, 24px);
  --gap:        clamp(7px, 1.8vw, 11px);
}

/* ─── BODY ──────────────────────────────── */
body {
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
           env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

/* Background — mostly black with subtle cyan/blue atmosphere */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    /* cyan upper-left bloom — 30 % weight */
    radial-gradient(ellipse 50% 45% at 12% 18%, rgba(0,229,255,0.09) 0%, transparent 65%),
    /* blue lower-right accent — 10 % weight */
    radial-gradient(ellipse 40% 38% at 88% 82%, rgba(26,74,255,0.07) 0%, transparent 60%),
    /* very faint grid — black dominates */
    repeating-linear-gradient(0deg,  transparent, transparent 44px, rgba(0,229,255,0.015) 45px),
    repeating-linear-gradient(90deg, transparent, transparent 44px, rgba(0,229,255,0.015) 45px);
}

/* Slow-floating blue orb top-right */
body::after {
  content: '';
  position: fixed; z-index: 0; pointer-events: none;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(26,74,255,0.09) 0%, transparent 70%);
  top: -70px; right: -70px;
  animation: orbDrift 9s ease-in-out infinite alternate;
}
@keyframes orbDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(-24px, 32px) scale(1.12); }
}

/* ─── SHELL ─────────────────────────────── */
.shell {
  position: relative; z-index: 1;
  width: min(94vw, 420px);
  background: var(--panel);
  border: 1.5px solid rgba(0,229,255,0.20);
  border-radius: var(--radius);
  backdrop-filter: blur(32px) saturate(160%);
  -webkit-backdrop-filter: blur(32px) saturate(160%);
  box-shadow:
    0 0 0 1px rgba(0,229,255,0.05),
    0 0 40px rgba(0,229,255,0.06),
    0 0 70px rgba(26,74,255,0.05),
    0 20px 60px rgba(0,0,0,0.95),
    inset 0 1px 0 rgba(0,229,255,0.10),
    inset 0 -1px 0 rgba(26,74,255,0.07);
  overflow: hidden;
}

/* Top accent stripe: cyan → blue */
.shell::before {
  content: '';
  position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,229,255,0.55) 35%,
    rgba(26,74,255,0.50) 65%,
    transparent 100%);
}

/* ─── BODY ──────────────────────────────── */
.body { padding: clamp(16px,4vw,24px) clamp(14px,4vw,22px) clamp(14px,3vw,20px); }

/* ─── HEADER ────────────────────────────── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: clamp(12px,3vw,18px);
}

.name {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(22px,6vw,30px);
  letter-spacing: clamp(6px,2vw,12px);
  color: var(--cyan);
  text-shadow:
    0 0 8px var(--cyan),
    0 0 26px rgba(0,229,255,0.40),
    0 0 55px rgba(0,229,255,0.15);
}

.header-right { display: flex; align-items: center; gap: 8px; }

.tag {
  font-size: clamp(8px,2vw,10px);
  color: var(--dim);
  letter-spacing: 2px;
  border: 1px solid rgba(0,229,255,0.18);
  padding: 3px 8px; border-radius: 4px;
  background: rgba(0,229,255,0.04);
}

/* ─── HISTORY BUTTON ────────────────────── */
.hist-btn {
  position: relative;
  width: clamp(34px,9vw,40px); height: clamp(34px,9vw,40px);
  border: 1.5px solid rgba(0,229,255,0.22);
  border-radius: 10px;
  background: rgba(0,10,20,0.80);
  color: var(--cyan);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  outline: none;
  box-shadow: 0 0 8px rgba(0,229,255,0.06);
}
.hist-btn svg { width: clamp(14px,4vw,17px); height: clamp(14px,4vw,17px); transition: transform 0.28s ease; }
.hist-btn:hover, .hist-btn:focus {
  background: rgba(0,229,255,0.08);
  border-color: var(--cyan);
  box-shadow: 0 0 18px rgba(0,229,255,0.22);
}
.hist-btn:active { transform: scale(0.91); }
.hist-btn.on {
  background: rgba(26,74,255,0.16);
  border-color: var(--blue);
  color: #7aaeff;
  box-shadow: 0 0 18px rgba(26,74,255,0.28);
}
.hist-btn.on svg { transform: rotate(180deg); }

.badge {
  position: absolute; top: -5px; right: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--blue);
  color: #c8d8ff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #000;
  box-shadow: 0 0 8px var(--blue);
  transition: opacity 0.2s, transform 0.2s;
  transform-origin: center;
}
.badge.hide { opacity: 0; transform: scale(0.3); pointer-events: none; }

/* ─── DISPLAY ───────────────────────────── */
.display {
  background: rgba(0,0,0,0.82);
  border: 1.5px solid rgba(0,229,255,0.13);
  border-radius: clamp(10px,2.5vw,16px);
  padding: clamp(12px,3vw,18px) clamp(14px,3.5vw,20px);
  margin-bottom: clamp(12px,3vw,18px);
  min-height: clamp(80px,20vw,100px);
  display: flex; flex-direction: column; justify-content: flex-end;
  position: relative; overflow: hidden;
  box-shadow:
    inset 0 2px 20px rgba(0,0,0,0.90),
    0 0 16px rgba(0,229,255,0.04);
}

/* Inner gradient tint — almost invisible, mostly black */
.display::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(140deg,
    rgba(0,229,255,0.03) 0%,
    transparent 50%,
    rgba(26,74,255,0.02) 100%);
}

/* CRT scanlines */
.display::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 4px);
}

.d-expr {
  font-size: clamp(10px,2.5vw,13px);
  color: var(--dim);
  text-align: right; min-height: 16px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-bottom: 4px; letter-spacing: 0.5px;
  position: relative; z-index: 1;
}

.d-val {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: clamp(30px,9vw,42px);
  color: var(--cyan);
  text-align: right; letter-spacing: 2px;
  word-break: break-all; line-height: 1.05;
  text-shadow: 0 0 16px var(--cyan), 0 0 40px rgba(0,229,255,0.25);
  transition: font-size 0.1s;
  position: relative; z-index: 1;
}
.d-val.sm { font-size: clamp(20px,6vw,28px); }
.d-val.xs { font-size: clamp(14px,4.5vw,20px); }

/* ─── BUTTON GRID ───────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: var(--gap);
}

.btn {
  position: relative;
  height: clamp(56px,14vw,70px);
  border-radius: clamp(10px,2.5vw,14px);
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: clamp(14px,4vw,19px);
  letter-spacing: 0.5px;
  transition: all 0.12s ease;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  outline: none;
  touch-action: manipulation;
}

/* gloss sheen */
.btn::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 42%;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
  pointer-events: none; border-radius: inherit;
}

/* ── Number ── (mostly black) */
.n {
  background: var(--btn-num);
  color: rgba(200,240,255,0.88);
  border: 1.5px solid rgba(0,229,255,0.10);
  box-shadow: 0 4px 0 rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.03);
}
.n:hover  { background: rgba(0,229,255,0.06); border-color: rgba(0,229,255,0.26); transform: translateY(-1px); box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 12px rgba(0,229,255,0.12); }
.n:active { transform: translateY(3px); box-shadow: none; background: rgba(0,229,255,0.10); }

/* ── Operator ── (cyan tint) */
.op {
  background: var(--btn-op);
  color: var(--cyan);
  border: 1.5px solid rgba(0,229,255,0.22);
  text-shadow: 0 0 8px rgba(0,229,255,0.50);
  box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 10px rgba(0,229,255,0.05);
}
.op:hover  { background: rgba(0,229,255,0.12); border-color: var(--cyan); transform: translateY(-1px); box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 18px rgba(0,229,255,0.22); }
.op:active { transform: translateY(3px); box-shadow: none; }
.op.lit    {
  background: rgba(0,229,255,0.14);
  border-color: var(--cyan);
  color: #fff;
  text-shadow: 0 0 14px var(--cyan);
  box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 22px rgba(0,229,255,0.32), inset 0 0 10px rgba(0,229,255,0.06);
}

/* ── Action ── (blue tint) */
.ac {
  background: var(--btn-ac);
  color: #7aaeff;
  border: 1.5px solid rgba(26,74,255,0.22);
  font-size: clamp(11px,3vw,14px);
  text-shadow: 0 0 8px rgba(26,74,255,0.55);
  box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 8px rgba(26,74,255,0.05);
}
.ac:hover  { background: rgba(26,74,255,0.14); border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 16px rgba(26,74,255,0.24); }
.ac:active { transform: translateY(3px); box-shadow: none; }

/* ── Equals ── (cyan fill — most prominent) */
.eq {
  background: linear-gradient(145deg, rgba(0,229,255,0.85), rgba(0,180,220,0.80));
  color: #001520;
  border: 1.5px solid var(--cyan);
  font-size: clamp(18px,5.5vw,26px); font-weight: 900;
  box-shadow: 0 4px 0 rgba(0,0,0,0.8), 0 0 22px rgba(0,229,255,0.38), 0 0 50px rgba(0,229,255,0.12);
  text-shadow: none;
}
.eq:hover  { filter: brightness(1.12); transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.8), 0 0 34px rgba(0,229,255,0.52); }
.eq:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.8); filter: brightness(0.88); }

.wide { grid-column: span 2; }

.foot {
  text-align: center; margin-top: clamp(10px,2.5vw,14px);
  font-size: clamp(8px,2vw,10px);
  color: rgba(0,229,255,0.18); letter-spacing: clamp(1px,0.5vw,2px);
}

/* ─── DIVIDER ───────────────────────────── */
.divider {
  height: 0; border: none;
  border-top: 1.5px solid rgba(0,229,255,0.12);
  opacity: 0; transition: opacity 0.25s ease 0.08s;
  /* cyan → blue gradient border */
  background: linear-gradient(90deg,
    transparent,
    rgba(0,229,255,0.35) 40%,
    rgba(26,74,255,0.30) 60%,
    transparent);
  border-image: linear-gradient(90deg,
    transparent,
    rgba(0,229,255,0.38) 40%,
    rgba(26,74,255,0.32) 60%,
    transparent) 1;
}
.divider.show { opacity: 1; }

/* ─── HISTORY DRAWER ────────────────────── */
.drawer { max-height: 0; overflow: hidden; transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1); }
.drawer.open { max-height: clamp(240px,60vw,320px); }

.drawer-inner {
  padding: clamp(12px,3vw,16px) clamp(14px,4vw,22px) clamp(14px,3.5vw,20px);
  /* drawer bg = deep black */
  background: rgba(2,3,8,0.96);
}

.hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: clamp(10px,2.5vw,14px); }

.hist-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(11px,3vw,14px); font-weight: 700;
  letter-spacing: 3px;
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0,229,255,0.42);
}

.clear-btn {
  background: rgba(26,74,255,0.08);
  border: 1px solid rgba(26,74,255,0.28);
  color: rgba(120,160,255,0.65);
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(8px,2vw,10px); letter-spacing: 1px;
  padding: clamp(3px,1vw,5px) clamp(8px,2vw,12px);
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
}
.clear-btn:hover { background: rgba(26,74,255,0.18); color: #7aaeff; border-color: var(--blue); box-shadow: 0 0 10px rgba(26,74,255,0.2); }

.hist-scroll {
  overflow-y: auto; max-height: clamp(170px,42vw,240px);
  scrollbar-width: thin; scrollbar-color: rgba(0,229,255,0.18) transparent;
  padding-right: 2px;
}
.hist-scroll::-webkit-scrollbar { width: 3px; }
.hist-scroll::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.18); border-radius: 2px; }

.hist-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: clamp(7px,2vw,10px) clamp(10px,2.5vw,13px);
  border-radius: clamp(8px,2vw,11px); margin-bottom: clamp(5px,1.5vw,8px);
  background: rgba(0,229,255,0.03);
  border: 1px solid rgba(0,229,255,0.09);
  cursor: pointer; transition: all 0.14s;
  animation: fadeIn 0.22s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hist-item:hover {
  background: rgba(0,229,255,0.08);
  border-color: rgba(0,229,255,0.22);
  transform: translateX(3px);
  box-shadow: 0 0 12px rgba(0,229,255,0.08);
}
.hist-item:active { transform: scale(0.97); }

.hi-left { flex: 1; overflow: hidden; }
.hi-expr  { font-size: clamp(9px,2.3vw,11px); color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.hi-res   { font-family: 'Orbitron', sans-serif; font-size: clamp(13px,3.5vw,16px); font-weight: 700; color: var(--cyan); text-shadow: 0 0 8px rgba(0,229,255,0.38); }
.hi-time  { font-size: clamp(8px,2vw,10px); color: rgba(0,229,255,0.20); white-space: nowrap; margin-left: 8px; flex-shrink: 0; }

.hist-empty {
  text-align: center; color: rgba(0,229,255,0.18);
  font-size: clamp(10px,2.5vw,12px); letter-spacing: 1px;
  padding: clamp(16px,5vw,26px) 0; line-height: 2.4;
}

/* ─── RIPPLE ────────────────────────────── */
.rpl {
  position: absolute; width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,229,255,0.22); pointer-events: none;
  animation: ripOut 0.42s ease-out forwards;
}
@keyframes ripOut {
  from { transform: scale(0); opacity: 0.55; }
  to   { transform: scale(4.5); opacity: 0; }
}

/* ─── VALUE ANIMATIONS ──────────────────── */
@keyframes cyanPulse {
  0%,100% { text-shadow: 0 0 16px var(--cyan), 0 0 40px rgba(0,229,255,0.25); }
  50%     { text-shadow: 0 0 38px #fff, 0 0 70px var(--cyan), 0 0 110px rgba(0,229,255,0.45); }
}
.d-val.pulse { animation: cyanPulse 0.30s ease; }

@keyframes errShake {
  0%,100% { transform: translateX(0); border-color: rgba(0,229,255,0.13); }
  20%,60% { transform: translateX(-5px); border-color: rgba(255,60,60,0.65); box-shadow: inset 0 2px 20px rgba(0,0,0,0.9), 0 0 16px rgba(255,60,60,0.28); }
  40%,80% { transform: translateX(5px);  border-color: rgba(255,60,60,0.65); }
}
.display.err { animation: errShake 0.38s ease; }

/* ─── DESKTOP ───────────────────────────── */
@media (min-width: 600px) {
  .shell { max-width: 420px; }
  .foot::after { content: " · H — HISTORY"; }
}
@media (max-width: 599px) {
  body { padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  .foot { display: none; }
}
</style>
</head>
<body>

<div class="shell">

  <div class="body">
    <div class="header">
      <div class="name">CALC</div>
      <div class="header-right">
        <div class="tag">v2</div>
        <button class="hist-btn" id="histBtn" onclick="toggleHist()" aria-label="Toggle History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15.5 14.2"/>
          </svg>
          <div class="badge hide" id="badge">0</div>
        </button>
      </div>
    </div>

    <div class="display" id="display">
      <div class="d-expr" id="expr"></div>
      <div class="d-val"  id="val">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="btn ac" onclick="clearAll()">AC</button>
      <button class="btn ac" onclick="toggleSign()">±</button>
      <button class="btn ac" onclick="percent()">%</button>
      <button class="btn op" id="op-÷" onclick="setOp('÷')">÷</button>
      <!-- Row 2 -->
      <button class="btn n" onclick="digit('7')">7</button>
      <button class="btn n" onclick="digit('8')">8</button>
      <button class="btn n" onclick="digit('9')">9</button>
      <button class="btn op" id="op-×" onclick="setOp('×')">×</button>
      <!-- Row 3 -->
      <button class="btn n" onclick="digit('4')">4</button>
      <button class="btn n" onclick="digit('5')">5</button>
      <button class="btn n" onclick="digit('6')">6</button>
      <button class="btn op" id="op-−" onclick="setOp('−')">−</button>
      <!-- Row 4 -->
      <button class="btn n" onclick="digit('1')">1</button>
      <button class="btn n" onclick="digit('2')">2</button>
      <button class="btn n" onclick="digit('3')">3</button>
      <button class="btn op" id="op-+" onclick="setOp('+')">+</button>
      <!-- Row 5 -->
      <button class="btn n wide" onclick="digit('0')">0</button>
      <button class="btn n"      onclick="dot()">.</button>
      <button class="btn eq"     onclick="calc()">=</button>
    </div>

    <div class="foot">KEYBOARD SUPPORTED</div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-inner">
      <div class="hist-head">
        <div class="hist-title">HISTORY</div>
        <button class="clear-btn" onclick="clearHist()">CLEAR ALL</button>
      </div>
      <div class="hist-scroll" id="histList">
        <div class="hist-empty" id="histEmpty">NO HISTORY YET<br>START CALCULATING</div>
      </div>
    </div>
  </div>

</div>

<script>
let cur = '0', prev = null, op = null, waiting = false, exprStr = '';
let histOpen = false;
let history = [];
try { history = JSON.parse(localStorage.getItem('calc_v2') || '[]'); } catch(e){}

const valEl  = document.getElementById('val');
const exprEl = document.getElementById('expr');
const dispEl = document.getElementById('display');

function show(v, e) {
  const s = String(v);
  valEl.className = 'd-val';
  if (s.length > 14) valEl.classList.add('xs');
  else if (s.length > 9) valEl.classList.add('sm');
  valEl.textContent = s;
  exprEl.textContent = e || '';
}

function pulse() { valEl.classList.remove('pulse'); void valEl.offsetWidth; valEl.classList.add('pulse'); }
function shakeErr() { dispEl.classList.remove('err'); void dispEl.offsetWidth; dispEl.classList.add('err'); }
function fmt(n) { if (!isFinite(n)) return 'Error'; return parseFloat(n.toPrecision(12)).toString(); }
function clearLit() { document.querySelectorAll('.op').forEach(b => b.classList.remove('lit')); }
function litOp(o) { clearLit(); const el = document.getElementById('op-'+o); if (el) el.classList.add('lit'); }

function digit(d) {
  if (waiting) { cur = d === '.' ? '0.' : d; waiting = false; }
  else {
    if (cur === '0' && d !== '.') cur = d;
    else if (d === '.' && cur.includes('.')) return;
    else cur += d;
  }
  show(cur, exprStr);
}

function dot() { digit('.'); }

function clearAll() {
  cur='0'; prev=null; op=null; waiting=false; exprStr='';
  clearLit(); show('0',''); pulse();
}

function toggleSign() { cur = String(parseFloat(cur)*-1); show(cur, exprStr); }
function percent()    { cur = String(parseFloat(cur)/100); show(cur, exprStr); }

function compute(a, b, o) {
  switch(o) {
    case '+': return a+b; case '−': return a-b;
    case '×': return a*b; case '÷': return b===0 ? null : a/b;
  }
  return b;
}

function setOp(o) {
  const n = parseFloat(cur);
  if (prev !== null && !waiting) {
    const r = compute(prev, n, op);
    if (r===null) { shakeErr(); return; }
    cur = fmt(r); prev = r;
  } else { prev = n; }
  op = o; waiting = true;
  exprStr = fmt(prev)+' '+o;
  litOp(o); show(cur, exprStr);
}

function calc() {
  if (op===null || waiting) return;
  const a = prev, b = parseFloat(cur);
  const es = fmt(a)+' '+op+' '+fmt(b);
  const r  = compute(a, b, op);
  if (r===null) { shakeErr(); show('Error', es+' ='); cur='0'; prev=null; op=null; waiting=false; exprStr=''; clearLit(); return; }
  const rs = fmt(r);
  pushHist(es, rs);
  cur=rs; prev=null; op=null; waiting=true; exprStr=es+' ='; clearLit();
  show(rs, exprStr); pulse();
}

function pushHist(e, r) {
  const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  history.unshift({e,r,t});
  if (history.length > 60) history.pop();
  try { localStorage.setItem('calc_v2', JSON.stringify(history)); } catch(e){}
  renderHist(); updateBadge();
}

function clearHist() {
  history = [];
  try { localStorage.removeItem('calc_v2'); } catch(e){}
  renderHist(); updateBadge();
}

function updateBadge() {
  const b = document.getElementById('badge');
  if (!history.length || histOpen) { b.classList.add('hide'); return; }
  b.textContent = history.length > 9 ? '9+' : history.length;
  b.classList.remove('hide');
}

function renderHist() {
  const list  = document.getElementById('histList');
  const empty = document.getElementById('histEmpty');
  list.querySelectorAll('.hist-item').forEach(el => el.remove());
  if (!history.length) { empty.style.display='block'; return; }
  empty.style.display='none';
  history.forEach(item => {
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.innerHTML = `
      <div class="hi-left">
        <div class="hi-expr">${item.e}</div>
        <div class="hi-res">= ${item.r}</div>
      </div>
      <div class="hi-time">${item.t}</div>
    `;
    d.addEventListener('click', () => {
      cur=item.r; prev=null; op=null; waiting=false;
      exprStr=item.e+' ='; clearLit(); show(cur,exprStr); pulse();
    });
    list.appendChild(d);
  });
}

function toggleHist() {
  histOpen = !histOpen;
  document.getElementById('histBtn').classList.toggle('on', histOpen);
  document.getElementById('drawer').classList.toggle('open', histOpen);
  document.getElementById('divider').classList.toggle('show', histOpen);
  updateBadge();
}

// Ripple
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    const r = document.createElement('div');
    r.className = 'rpl';
    const rc = btn.getBoundingClientRect();
    r.style.left = (e.clientX - rc.left - 17)+'px';
    r.style.top  = (e.clientY - rc.top  - 17)+'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 440);
  });
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') { digit(e.key); return; }
  switch(e.key) {
    case '.': case ',':  dot(); break;
    case '+':            setOp('+'); break;
    case '-':            setOp('−'); break;
    case '*':            setOp('×'); break;
    case '/':            e.preventDefault(); setOp('÷'); break;
    case '%':            percent(); break;
    case 'Enter': case '=': calc(); break;
    case 'Backspace':
      if (!waiting && cur.length > 1) cur = cur.slice(0,-1); else cur='0';
      show(cur, exprStr); break;
    case 'Escape':       clearAll(); break;
    case 'h': case 'H': toggleHist(); break;
  }
});

renderHist();
show('0','');
updateBadge();
</script>
</body>
</html>
