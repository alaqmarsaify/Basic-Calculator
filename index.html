<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#efe5db"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>CALC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* , *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #efe5db;
  --bg-2: #eadfd4;
  --panel: rgba(236, 226, 215, 0.78);
  --panel-edge: rgba(255,255,255,0.62);
  --display-text: #5d5550;
  --display-main: #544e49;
  --muted: #aba29a;
  --num-bg: #f4eee7;
  --num-border: rgba(214, 201, 190, 0.95);
  --num-text: #d8cfc7;
  --orange: #ff980f;
  --orange-2: #f58d07;
  --orange-shadow: rgba(232, 141, 15, 0.35);
  --shadow-soft: 0 16px 28px rgba(145, 121, 97, 0.16);
  --shadow-btn: 0 6px 14px rgba(177, 154, 132, 0.20);
}

html, body {
  min-height: 100%;
}

body {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at -8% 85%, #d79b53 0 24%, transparent 24.5%),
    radial-gradient(circle at 118% 15%, #d89c55 0 20%, transparent 20.5%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  font-family: 'Inter', system-ui, sans-serif;
  overflow-x: hidden;
  padding: 18px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 42%),
    linear-gradient(180deg, rgba(255,255,255,0.08), transparent 24%, transparent 76%, rgba(191,160,129,0.06));
}

.shell {
  position: relative;
  width: min(100%, 330px);
  border-radius: 30px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.05)),
    linear-gradient(180deg, rgba(243,235,227,0.86), rgba(230,220,208,0.9));
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow:
    0 24px 40px rgba(132, 109, 86, 0.16),
    0 8px 18px rgba(255,255,255,0.18),
    inset 0 1px 0 rgba(255,255,255,0.8),
    inset 0 -1px 0 rgba(215, 201, 188, 0.7);
  backdrop-filter: blur(16px) saturate(1.05);
  -webkit-backdrop-filter: blur(16px) saturate(1.05);
  overflow: hidden;
}

.shell::before {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 29px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.02) 35%, transparent 70%);
  opacity: 0.9;
}

.body {
  padding: 16px 14px 14px;
}

.header {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 16px;
}

.name,
.tag,
.foot {
  display: none;
}

.header-right {
  width: 100%;
  display: flex;
  justify-content: flex-start;
}

.hist-btn {
  position: relative;
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: #6b625b;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
}

.hist-btn svg {
  width: 14px;
  height: 14px;
}

.hist-btn:hover,
.hist-btn:focus-visible {
  background: rgba(84, 78, 73, 0.08);
}

.hist-btn:active {
  transform: scale(0.92);
}

.hist-btn.on {
  background: rgba(255, 152, 15, 0.16);
  color: var(--orange-2);
}

.badge {
  position: absolute;
  top: -2px;
  right: -5px;
  min-width: 14px;
  height: 14px;
  padding: 0 3px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--orange);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  box-shadow: 0 4px 8px rgba(255, 152, 15, 0.25);
}

.badge.hide {
  display: none;
}

.display {
  min-height: 118px;
  padding: 14px 10px 16px;
  margin-bottom: 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 22px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.34),
    inset 0 -1px 0 rgba(208,191,175,0.24),
    0 10px 18px rgba(160, 136, 111, 0.08);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  overflow: hidden;
}

.display::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent 42%);
  pointer-events: none;
}

.display::after {
  content: '';
  position: absolute;
  right: -22px;
  top: -18px;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, transparent 68%);
  pointer-events: none;
}

.d-expr {
  min-height: 18px;
  text-align: right;
  font-size: 14px;
  line-height: 1.2;
  color: var(--muted);
  letter-spacing: 0;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.d-val {
  text-align: right;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: clamp(30px, 10vw, 44px);
  font-weight: 600;
  line-height: 1;
  color: var(--display-main);
  letter-spacing: -0.03em;
  text-shadow: none;
  word-break: break-all;
  opacity: 1;
  transform: translateY(0);
}

.d-val.anim-in {
  animation: valueSlideIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
}

.d-val.sm {
  font-size: clamp(24px, 8vw, 34px);
}

.d-val.xs {
  font-size: clamp(18px, 6vw, 24px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.btn {
  position: relative;
  height: 42px;
  border: none;
  border-radius: 999px;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 18px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease, filter 0.18s ease;
  box-shadow: var(--shadow-btn);
  outline: none;
  overflow: hidden;
  transform-origin: center;
  will-change: transform, box-shadow;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
  opacity: 0.55;
  pointer-events: none;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn.press {
  transform: scale(0.94);
}

.btn:active {
  transform: scale(0.95);
}

.n,
.ac {
  background: linear-gradient(180deg, #f4eee7 0%, #eee6dd 100%);
  color: #d5ccc4;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(219, 205, 193, 0.95),
    0 7px 12px rgba(177, 154, 132, 0.16);
}

.n:hover,
.ac:hover {
  background: linear-gradient(180deg, #f7f1eb 0%, #efe7de 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.98),
    inset 0 -1px 0 rgba(219, 205, 193, 0.95),
    0 9px 18px rgba(177, 154, 132, 0.2),
    0 0 0 1px rgba(255,255,255,0.22);
}

.op,
.eq {
  background: linear-gradient(180deg, #ffa51f 0%, #f69209 100%);
  color: #ffffff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.38),
    inset 0 -1px 0 rgba(218, 123, 0, 0.32),
    0 9px 14px var(--orange-shadow);
}

.op:hover,
.eq:hover {
  background: linear-gradient(180deg, #ffad31 0%, #f89c1e 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.42),
    inset 0 -1px 0 rgba(218, 123, 0, 0.34),
    0 11px 18px rgba(245, 146, 9, 0.34),
    0 0 14px rgba(255, 170, 49, 0.22);
}

.op.lit {
  background: linear-gradient(180deg, #ffb43c 0%, #fb9917 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.4),
    inset 0 -1px 0 rgba(218, 123, 0, 0.35),
    0 10px 16px rgba(245, 146, 9, 0.42);
}

.wide {
  grid-column: span 2;
}

.divider {
  height: 0;
  border: none;
  border-top: 1px solid rgba(180, 164, 149, 0.32);
  opacity: 0;
  transition: opacity 0.22s ease;
}

.divider.show {
  opacity: 1;
}

.drawer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.drawer.open {
  max-height: 320px;
}

.drawer-inner {
  background: rgba(241, 233, 224, 0.96);
  padding: 14px;
}

.hist-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.hist-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: #7e746d;
}

.clear-btn {
  border: none;
  border-radius: 999px;
  padding: 7px 12px;
  background: rgba(255, 152, 15, 0.14);
  color: #b56d06;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}

.hist-scroll {
  max-height: 230px;
  overflow-y: auto;
  padding-right: 2px;
}

.hist-scroll::-webkit-scrollbar {
  width: 4px;
}

.hist-scroll::-webkit-scrollbar-thumb {
  background: rgba(175, 156, 140, 0.6);
  border-radius: 999px;
}

.hist-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  border-radius: 16px;
  background: rgba(255,255,255,0.45);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  cursor: pointer;
}

.hist-item:hover {
  background: rgba(255,255,255,0.7);
}

.hi-left {
  min-width: 0;
}

.hi-expr {
  font-size: 11px;
  color: #a59c94;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hi-res {
  margin-top: 2px;
  font-size: 15px;
  font-weight: 600;
  color: #5a534d;
}

.hi-time {
  flex-shrink: 0;
  font-size: 10px;
  color: #b0a59b;
}

.hist-empty {
  text-align: center;
  padding: 18px 0 22px;
  font-size: 12px;
  line-height: 1.9;
  color: #b0a59b;
}

.rpl {
  position: absolute;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(255,255,255,0.28);
  pointer-events: none;
  animation: ripOut 0.42s ease-out forwards;
}

@keyframes ripOut {
  from { transform: scale(0); opacity: 0.65; }
  to { transform: scale(4.8); opacity: 0; }
}

@keyframes valuePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes valueSlideIn {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

.d-val.pulse {
  animation: valuePop 0.2s ease;
}

@keyframes errShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
}

.display.err {
  animation: errShake 0.28s ease;
}

@media (max-width: 380px) {
  .body {
    padding: 14px 12px 12px;
  }

  .grid {
    gap: 9px;
  }

  .btn {
    height: 40px;
    font-size: 17px;
  }
}
</style>
</head>
<body>

<div class="shell">

  <div class="body">
    <div class="header">
      <div class="name">CALC</div>
      <div class="header-right">
        <div class="tag">v2</div>
        <button class="hist-btn" id="histBtn" onclick="toggleHist()" aria-label="Toggle History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15.5 14.2"/>
          </svg>
          <div class="badge hide" id="badge">0</div>
        </button>
      </div>
    </div>

    <div class="display" id="display">
      <div class="d-expr" id="expr"></div>
      <div class="d-val" id="val">0</div>
    </div>

    <div class="grid">
      <button class="btn ac" onclick="clearAll()">AC</button>
      <button class="btn ac" onclick="toggleSign()">±</button>
      <button class="btn ac" onclick="percent()">%</button>
      <button class="btn op" id="op-÷" onclick="setOp('÷')">÷</button>

      <button class="btn n" onclick="digit('7')">7</button>
      <button class="btn n" onclick="digit('8')">8</button>
      <button class="btn n" onclick="digit('9')">9</button>
      <button class="btn op" id="op-×" onclick="setOp('×')">×</button>

      <button class="btn n" onclick="digit('4')">4</button>
      <button class="btn n" onclick="digit('5')">5</button>
      <button class="btn n" onclick="digit('6')">6</button>
      <button class="btn op" id="op-−" onclick="setOp('−')">−</button>

      <button class="btn n" onclick="digit('1')">1</button>
      <button class="btn n" onclick="digit('2')">2</button>
      <button class="btn n" onclick="digit('3')">3</button>
      <button class="btn op" id="op-+" onclick="setOp('+')">+</button>

      <button class="btn n wide" onclick="digit('0')">0</button>
      <button class="btn n" onclick="dot()">.</button>
      <button class="btn eq" onclick="calc()">=</button>
    </div>

    <div class="foot">KEYBOARD SUPPORTED</div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-inner">
      <div class="hist-head">
        <div class="hist-title">HISTORY</div>
        <button class="clear-btn" onclick="clearHist()">CLEAR ALL</button>
      </div>
      <div class="hist-scroll" id="histList">
        <div class="hist-empty" id="histEmpty">NO HISTORY YET<br>START CALCULATING</div>
      </div>
    </div>
  </div>

</div>

<script>
let cur = '0', prev = null, op = null, waiting = false, exprStr = '';
let histOpen = false;
let history = [];
try { history = JSON.parse(localStorage.getItem('calc_v2') || '[]'); } catch(e){}

const valEl  = document.getElementById('val');
const exprEl = document.getElementById('expr');
const dispEl = document.getElementById('display');
let lastShownValue = '0';

function show(v, e, animate = true) {
  const s = String(v);
  valEl.className = 'd-val';
  if (s.length > 14) valEl.classList.add('xs');
  else if (s.length > 9) valEl.classList.add('sm');
  if (animate && s !== lastShownValue) {
    valEl.classList.remove('anim-in');
    void valEl.offsetWidth;
    valEl.classList.add('anim-in');
  }
  valEl.textContent = s;
  exprEl.textContent = e || '';
  lastShownValue = s;
}

function pulse() { valEl.classList.remove('pulse'); void valEl.offsetWidth; valEl.classList.add('pulse'); }
function shakeErr() { dispEl.classList.remove('err'); void dispEl.offsetWidth; dispEl.classList.add('err'); }
function fmt(n) { if (!isFinite(n)) return 'Error'; return parseFloat(n.toPrecision(12)).toString(); }
function clearLit() { document.querySelectorAll('.op').forEach(b => b.classList.remove('lit')); }
function litOp(o) { clearLit(); const el = document.getElementById('op-'+o); if (el) el.classList.add('lit'); }

function digit(d) {
  if (waiting) { cur = d === '.' ? '0.' : d; waiting = false; }
  else {
    if (cur === '0' && d !== '.') cur = d;
    else if (d === '.' && cur.includes('.')) return;
    else cur += d;
  }
  show(cur, exprStr);
}

function dot() { digit('.'); }

function clearAll() {
  cur='0'; prev=null; op=null; waiting=false; exprStr='';
  clearLit(); show('0','', false); pulse();
}

function toggleSign() { cur = String(parseFloat(cur)*-1); show(cur, exprStr); }
function percent()    { cur = String(parseFloat(cur)/100); show(cur, exprStr); }

function compute(a, b, o) {
  switch(o) {
    case '+': return a+b; case '−': return a-b;
    case '×': return a*b; case '÷': return b===0 ? null : a/b;
  }
  return b;
}

function setOp(o) {
  const n = parseFloat(cur);
  if (prev !== null && !waiting) {
    const r = compute(prev, n, op);
    if (r===null) { shakeErr(); return; }
    cur = fmt(r); prev = r;
  } else { prev = n; }
  op = o; waiting = true;
  exprStr = fmt(prev)+' '+o;
  litOp(o); show(cur, exprStr);
}

function calc() {
  if (op===null || waiting) return;
  const a = prev, b = parseFloat(cur);
  const es = fmt(a)+' '+op+' '+fmt(b);
  const r  = compute(a, b, op);
  if (r===null) { shakeErr(); show('Error', es+' ='); cur='0'; prev=null; op=null; waiting=false; exprStr=''; clearLit(); return; }
  const rs = fmt(r);
  pushHist(es, rs);
  cur=rs; prev=null; op=null; waiting=true; exprStr=es+' ='; clearLit();
  show(rs, exprStr); pulse();
}

function pushHist(e, r) {
  const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  history.unshift({e,r,t});
  if (history.length > 60) history.pop();
  try { localStorage.setItem('calc_v2', JSON.stringify(history)); } catch(e){}
  renderHist(); updateBadge();
}

function clearHist() {
  history = [];
  try { localStorage.removeItem('calc_v2'); } catch(e){}
  renderHist(); updateBadge();
}

function updateBadge() {
  const b = document.getElementById('badge');
  if (!history.length || histOpen) { b.classList.add('hide'); return; }
  b.textContent = history.length > 9 ? '9+' : history.length;
  b.classList.remove('hide');
}

function renderHist() {
  const list  = document.getElementById('histList');
  const empty = document.getElementById('histEmpty');
  list.querySelectorAll('.hist-item').forEach(el => el.remove());
  if (!history.length) { empty.style.display='block'; return; }
  empty.style.display='none';
  history.forEach(item => {
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.innerHTML = `
      <div class="hi-left">
        <div class="hi-expr">${item.e}</div>
        <div class="hi-res">= ${item.r}</div>
      </div>
      <div class="hi-time">${item.t}</div>
    `;
    d.addEventListener('click', () => {
      cur=item.r; prev=null; op=null; waiting=false;
      exprStr=item.e+' ='; clearLit(); show(cur,exprStr); pulse();
    });
    list.appendChild(d);
  });
}

function toggleHist() {
  histOpen = !histOpen;
  document.getElementById('histBtn').classList.toggle('on', histOpen);
  document.getElementById('drawer').classList.toggle('open', histOpen);
  document.getElementById('divider').classList.toggle('show', histOpen);
  updateBadge();
}

document.querySelectorAll('.btn').forEach(btn => {
  const release = () => btn.classList.remove('press');
  btn.addEventListener('pointerdown', e => {
    btn.classList.add('press');
    const r = document.createElement('div');
    r.className = 'rpl';
    const rc = btn.getBoundingClientRect();
    r.style.left = (e.clientX - rc.left - 12)+'px';
    r.style.top  = (e.clientY - rc.top  - 12)+'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 440);
  });
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', release);
});

document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') { digit(e.key); return; }
  switch(e.key) {
    case '.': case ',':  dot(); break;
    case '+':            setOp('+'); break;
    case '-':            setOp('−'); break;
    case '*':            setOp('×'); break;
    case '/':            e.preventDefault(); setOp('÷'); break;
    case '%':            percent(); break;
    case 'Enter': case '=': calc(); break;
    case 'Backspace':
      if (!waiting && cur.length > 1) cur = cur.slice(0,-1); else cur='0';
      show(cur, exprStr); break;
    case 'Escape':       clearAll(); break;
    case 'h': case 'H': toggleHist(); break;
  }
});

renderHist();
show('0','', false);
updateBadge();
</script>
</body>
</html>
